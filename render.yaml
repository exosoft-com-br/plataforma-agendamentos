services:
  - type: web
    name: agendei-io-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://app.agendei.io.exosoft.com.br
      - key: NODE_ENV
        value: production
      # SUPABASE_URL, SUPABASE_ANON_KEY e SUPABASE_SERVICE_ROLE_KEY
      # são configuradas via Dashboard/API do Render (não versionadas no git)
