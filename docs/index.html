<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00A8C6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="agendei.io">
  <meta name="description" content="Agendamento online simples e rápido — criado pela startup exosoft">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>agendei.io — Agendamento Online</title>
  <style>
    :root {
      --cor-primaria: #00A8C6;
      --cor-secundaria: #004D61;
      --cor-texto: #ffffff;
      --cor-fundo: #f0f4f6;
      --cor-botao: #00A8C6;
      --cor-botao-texto: #ffffff;
      --fonte-titulo: 'Montserrat', system-ui, -apple-system, sans-serif;
      --fonte-corpo: 'Montserrat', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--fonte-corpo);
      background: linear-gradient(135deg, var(--cor-primaria) 0%, var(--cor-secundaria) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    /* ===== BANNER ===== */
    .brand-banner {
      background: linear-gradient(135deg, var(--cor-primaria) 0%, var(--cor-secundaria) 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-bottom: 3px solid rgba(255,255,255,.15);
    }
    .brand-banner .brand-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .brand-banner .brand-text { color: #fff; line-height: 1.2; }
    .brand-banner .brand-text strong { font-size: 1rem; font-weight: 800; letter-spacing: -.01em; }
    .brand-banner .brand-text small { font-size: .68rem; opacity: .8; display: block; }
    .banner-img { width: 100%; max-height: 160px; object-fit: cover; }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
      color: var(--cor-texto);
      padding: 20px 24px;
      text-align: center;
    }
    .header img.logo { max-height: 56px; margin-bottom: 8px; border-radius: 8px; }
    .header h1 { font-family: var(--fonte-titulo); font-size: 1.25rem; font-weight: 800; margin-bottom: 4px; }
    .header p { opacity: .85; font-size: .85rem; }

    .body { padding: 24px; }
    .step { display: none; }
    .step.active { display: block; }

    /* ===== FORMULÁRIO ===== */
    label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: .88rem; }
    input, select {
      width: 100%; padding: 12px; border: 2px solid #dde4e8;
      border-radius: 8px; font-size: 1rem; margin-bottom: 16px;
      transition: border-color .2s, box-shadow .2s; font-family: var(--fonte-corpo);
    }
    input:focus, select:focus {
      outline: none; border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(0,168,198,.12);
    }

    /* ===== BOTÕES ===== */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform .1s, opacity .2s, box-shadow .2s;
      font-family: var(--fonte-corpo); letter-spacing: .01em;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--cor-botao), var(--cor-secundaria));
      color: var(--cor-botao-texto);
      box-shadow: 0 4px 14px rgba(0,168,198,.3);
    }
    .btn-primary:hover { opacity: .93; box-shadow: 0 6px 20px rgba(0,168,198,.4); }
    .btn-secondary { background: #f0f4f6; color: #444; margin-top: 8px; }
    .btn-secondary:hover { background: #e2eaed; }
    .btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }

    /* ===== SLOTS ===== */
    .slots-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 16px;
    }
    .slot-btn {
      padding: 10px 4px; border: 2px solid #dde4e8; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: .9rem; font-weight: 600;
      transition: all .2s; text-align: center; font-family: var(--fonte-corpo);
    }
    .slot-btn:hover { border-color: var(--cor-primaria); background: rgba(0,168,198,.06); }
    .slot-btn.selected {
      border-color: var(--cor-primaria); background: var(--cor-primaria);
      color: var(--cor-texto); box-shadow: 0 2px 8px rgba(0,168,198,.3);
    }
    .slot-btn.ocupado { background: #f5f7f8; color: #bbb; cursor: not-allowed; text-decoration: line-through; border-color: #eee; }

    /* ===== SUCESSO ===== */
    .success-box {
      background: linear-gradient(135deg, #e8f8fb, #d4f0f7);
      border: 2px solid var(--cor-primaria);
      border-radius: 14px; padding: 24px; text-align: center;
    }
    .success-box .check-icon {
      width: 56px; height: 56px; background: var(--cor-primaria);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; font-size: 1.6rem;
      box-shadow: 0 4px 16px rgba(0,168,198,.35);
    }
    .success-box h2 { color: var(--cor-secundaria); margin-bottom: 6px; font-size: 1.2rem; font-weight: 800; }
    .success-box .protocolo {
      font-size: 1.4rem; font-weight: 800; color: var(--cor-secundaria);
      background: rgba(0,168,198,.12); padding: 10px 20px; border-radius: 10px;
      display: inline-block; margin: 10px 0; letter-spacing: .04em;
    }
    .success-box .msg { font-size: .88rem; color: #555; margin-top: 8px; line-height: 1.5; }

    /* ===== ERROS ===== */
    .error { color: #c0392b; font-size: .84rem; margin-bottom: 12px; }
    .loading { text-align: center; padding: 20px; color: #667C85; font-size: .9rem; }

    /* ===== CARDS DE SERVIÇO ===== */
    .service-card {
      border: 2px solid #dde4e8; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; cursor: pointer; transition: all .2s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .service-card:hover { border-color: var(--cor-primaria); background: rgba(0,168,198,.04); }
    .service-card.selected {
      border-color: var(--cor-primaria); background: rgba(0,168,198,.08);
      box-shadow: 0 2px 10px rgba(0,168,198,.15);
    }
    .service-card .name { font-weight: 700; font-size: .95rem; color: #222; }
    .service-card .meta { font-size: .82rem; color: #667C85; margin-top: 2px; }
    .service-card .price { font-weight: 800; color: var(--cor-primaria); font-size: 1.05rem; }

    .cancel-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    .cancel-section h3 { margin-bottom: 12px; color: #667C85; font-size: .9rem; font-weight: 600; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--cor-secundaria); color: #fff;
      padding: 14px 24px; border-radius: 50px;
      font-weight: 600; font-size: .9rem; font-family: var(--fonte-corpo);
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
      display: flex; align-items: center; gap: 10px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0; z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast .toast-icon { font-size: 1.1rem; }

    /* ===== STEP INDICATOR ===== */
    .step-indicator {
      display: flex; justify-content: center; gap: 6px;
      padding: 12px 0 4px;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #dde4e8; transition: all .3s;
    }
    .step-dot.active { background: var(--cor-primaria); width: 22px; border-radius: 4px; }
    .step-dot.done { background: var(--cor-primaria); opacity: .4; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Banner customizável ou padrão agendei.io -->
    <div id="bannerContainer">
      <div class="brand-banner" id="brandBanner">
        <div class="brand-icon">📅</div>
        <div class="brand-text">
          <strong>agendei.io</strong>
          <small>criado pela startup exosoft</small>
        </div>
      </div>
    </div>

    <div class="header">
      <img id="headerLogo" class="logo" style="display:none" alt="Logo">
      <h1 id="headerTitle">Agendamento Online</h1>
      <p id="headerSubtitle">Escolha seu horário em poucos passos</p>
    </div>

    <div class="body">
      <!-- Indicador de etapas -->
      <div class="step-indicator" id="stepIndicator" style="display:none">
        <div class="step-dot" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
        <div class="step-dot" id="dot4"></div>
      </div>

      <!-- Step 0: Carregando -->
      <div id="step0" class="step active">
        <div class="loading">⏳ Carregando...</div>
      </div>

      <!-- Step 1: Dados do cliente -->
      <div id="step1" class="step">
        <label>Como posso te chamar?</label>
        <input type="text" id="clienteNome" placeholder="Seu nome completo" minlength="3" autocomplete="name">
        <label>Seu WhatsApp (com DDD)</label>
        <input type="tel" id="clienteTelefone" placeholder="5511999999999" pattern="\d{12,13}" autocomplete="tel">
        <div id="err1" class="error"></div>
        <button class="btn btn-primary" onclick="goStep2()">Continuar →</button>
      </div>

      <!-- Step 2: Serviço -->
      <div id="step2" class="step">
        <label>Escolha o serviço:</label>
        <div id="servicosList"></div>
        <div id="err2" class="error"></div>
        <button class="btn btn-secondary" onclick="showStep(1)">← Voltar</button>
      </div>

      <!-- Step 2.5: Prestador -->
      <div id="step2_5" class="step">
        <label>Com qual profissional?</label>
        <div id="prestadoresList"></div>
        <div id="err2_5" class="error"></div>
        <button class="btn btn-secondary" onclick="showStep(2)">← Voltar</button>
      </div>

      <!-- Step 3: Data -->
      <div id="step3" class="step">
        <label>Para qual dia?</label>
        <input type="date" id="dataConsulta" min="">
        <div id="err3" class="error"></div>
        <button class="btn btn-primary" onclick="goStep4()">Ver horários disponíveis</button>
        <button class="btn btn-secondary" onclick="showStep(2)">← Voltar</button>
      </div>

      <!-- Step 4: Horário -->
      <div id="step4" class="step">
        <label>Escolha o horário:</label>
        <div id="slotsGrid" class="slots-grid"></div>
        <div id="err4" class="error"></div>
        <button class="btn btn-primary" id="btnConfirmar" onclick="confirmarAgendamento()" disabled>
          ✅ Confirmar Agendamento
        </button>
        <button class="btn btn-secondary" onclick="showStep(3)">← Voltar</button>
      </div>

      <!-- Step 5: Sucesso -->
      <div id="step5" class="step">
        <div class="success-box">
          <div class="check-icon">✅</div>
          <h2>Agendamento Confirmado!</h2>
          <p style="color:#667C85;font-size:.85rem">Seu protocolo de atendimento:</p>
          <div class="protocolo" id="resultProtocolo"></div>
          <p class="msg" id="resultMsg"></p>
        </div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">
          + Novo Agendamento
        </button>
        <div class="cancel-section">
          <h3>Cancelar um agendamento existente</h3>
          <input type="text" id="cancelProtocolo" placeholder="Protocolo (ex: AGD-2026-XXXX)">
          <input type="tel" id="cancelTelefone" placeholder="Telefone cadastrado (5511999...)">
          <div id="cancelResult" class="error"></div>
          <button class="btn btn-secondary" onclick="cancelarAgendamento()">Cancelar Agendamento</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast de notificação -->
  <div class="toast" id="toast">
    <span class="toast-icon">🎉</span>
    <span id="toastMsg">Agendamento realizado com sucesso!</span>
  </div>

  <script>
    // === CONFIGURAÇÃO ===
    const API_URL = localStorage.getItem('apiUrl') || 'https://plataforma-agendamentos-api.onrender.com';
    const NEGOCIO_ID = new URLSearchParams(window.location.search).get('negocio');
    const NICHO_ID = new URLSearchParams(window.location.search).get('nicho') || localStorage.getItem('nichoId') || 'barbearia';

    let config = null;
    let negocioData = null;
    let selectedServico = null;
    let selectedPrestador = null;
    let selectedSlot = null;

    // === TOAST ===
    function mostrarToast(msg, icone = '🎉', duracao = 4000) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.querySelector('.toast-icon').textContent = icone;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duracao);
    }

    // === STEP INDICATOR ===
    function atualizarIndicador(step) {
      const indicator = document.getElementById('stepIndicator');
      if (step === 0 || step === 5) { indicator.style.display = 'none'; return; }
      indicator.style.display = 'flex';
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById(`dot${i}`);
        dot.className = 'step-dot' + (i < step ? ' done' : '') + (i === step ? ' active' : '');
      }
    }

    // === PERSONALIZAÇÃO DINÂMICA ===
    function aplicarPersonalizacao(p) {
      if (!p) return;
      const r = document.documentElement.style;
      if (p.corPrimaria) r.setProperty('--cor-primaria', p.corPrimaria);
      if (p.corSecundaria) r.setProperty('--cor-secundaria', p.corSecundaria);
      if (p.corTexto) r.setProperty('--cor-texto', p.corTexto);
      if (p.corFundo) r.setProperty('--cor-fundo', p.corFundo);
      if (p.corBotao) r.setProperty('--cor-botao', p.corBotao);
      if (p.corBotaoTexto) r.setProperty('--cor-botao-texto', p.corBotaoTexto);
      if (p.fonteTitulo) r.setProperty('--fonte-titulo', `'${p.fonteTitulo}', system-ui, sans-serif`);
      if (p.fonteCorpo) r.setProperty('--fonte-corpo', `'${p.fonteCorpo}', system-ui, sans-serif`);

      if (p.logoUrl) {
        const logo = document.getElementById('headerLogo');
        logo.src = p.logoUrl;
        logo.style.display = 'block';
        logo.onerror = () => { logo.style.display = 'none'; };
      }

      if (p.bannerUrl) {
        // Banner customizado: substitui o banner padrão agendei.io
        document.getElementById('bannerContainer').innerHTML =
          `<img class="banner-img" src="${p.bannerUrl}" alt="Banner" onerror="this.parentElement.innerHTML='<div class=brand-banner id=brandBanner><div class=brand-icon>📅</div><div class=brand-text><strong>agendei.io</strong><small>criado pela startup exosoft</small></div></div>'">`;
      }

      if (p.faviconUrl) {
        let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
        link.rel = 'icon';
        link.href = p.faviconUrl;
        document.head.appendChild(link);
      }
    }

    // === INIT ===
    async function init() {
      if (NEGOCIO_ID) {
        await carregarNegocio();
      } else {
        document.getElementById('step0').innerHTML = '<div class="error">⚠️ ID do Negócio não especificado na URL.</div>';
      }
    }

    async function carregarNegocio() {
      try {
        const res = await fetch(`${API_URL}/api/negocio/${NEGOCIO_ID}/publico`);
        if (!res.ok) {
          const err = await res.json();
          document.getElementById('step0').innerHTML = `<div class="error">${err.erro || 'Negócio não encontrado.'}</div>`;
          return;
        }
        negocioData = await res.json();

        aplicarPersonalizacao(negocioData.personalizacao);

        config = {
          nicho: negocioData.nicho,
          prestadores: negocioData.prestadores,
          servicos: negocioData.servicos,
        };

        const titulo = negocioData.negocio.nomeFantasia || negocioData.nicho.nomePublico;
        document.title = `${titulo} — agendei.io`;
        document.getElementById('headerTitle').textContent = titulo;
        document.getElementById('headerSubtitle').textContent = negocioData.nicho.saudacaoInicial || 'Agende seu horário online';

        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('dataConsulta').min = tomorrow.toISOString().split('T')[0];
        document.getElementById('dataConsulta').value = tomorrow.toISOString().split('T')[0];

        showStep(1);
      } catch (e) {
        document.getElementById('step0').innerHTML = `<div class="error">Erro de conexão: ${e.message}</div>`;
      }
    }

    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${n}`).classList.add('active');
      const stepNum = n === '2_5' ? 2 : Number(n);
      atualizarIndicador(stepNum);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Step 1 → 2
    function goStep2() {
      const nome = document.getElementById('clienteNome').value.trim();
      const tel = document.getElementById('clienteTelefone').value.trim();
      if (nome.length < 3) { document.getElementById('err1').textContent = 'Nome deve ter pelo menos 3 caracteres.'; return; }
      if (!/^\d{10,13}$/.test(tel)) { document.getElementById('err1').textContent = 'Telefone inválido (ex: 5511999999999).'; return; }
      document.getElementById('err1').textContent = '';

      const list = document.getElementById('servicosList');
      list.innerHTML = '';
      if (!config.servicos || config.servicos.length === 0) {
        list.innerHTML = '<div class="error">Nenhum serviço disponível.</div>';
        showStep(2);
        return;
      }
      config.servicos.forEach(s => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.innerHTML = `
          <div>
            <div class="name">${s.nome}</div>
            <div class="meta">⏱ ${s.duracaoMinutos} min</div>
          </div>
          <div class="price">${s.preco ? `R$ ${Number(s.preco).toFixed(2)}` : ''}</div>
        `;
        card.onclick = () => {
          document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedServico = s;

          if (!config.prestadores || config.prestadores.length === 0) {
            document.getElementById('err2').textContent = 'Nenhum profissional disponível.';
            return;
          }

          // Filtra apenas o(s) prestador(es) vinculado(s) a este serviço
          const vinculados = s.prestadorId
            ? config.prestadores.filter(p => p.id === s.prestadorId)
            : config.prestadores;
          const lista = vinculados.length > 0 ? vinculados : config.prestadores;

          if (lista.length === 1) {
            // Apenas um profissional para este serviço — seleciona automaticamente
            selectedPrestador = lista[0];
            showStep(3);
          } else {
            const prestadoresList = document.getElementById('prestadoresList');
            prestadoresList.innerHTML = '';
            lista.forEach(p => {
              const pCard = document.createElement('div');
              pCard.className = 'service-card prestador-card';
              pCard.innerHTML = `<div><div class="name">👤 ${p.nome}</div><div class="meta">${p.categoria || ''}</div></div>`;
              pCard.onclick = () => { selectedPrestador = p; showStep(3); };
              prestadoresList.appendChild(pCard);
            });
            showStep('2_5');
          }
        };
        list.appendChild(card);
      });

      showStep(2);
    }

    // Step 3 → 4
    async function goStep4() {
      const data = document.getElementById('dataConsulta').value;
      if (!data) { document.getElementById('err3').textContent = 'Selecione uma data.'; return; }
      document.getElementById('err3').textContent = '';

      const grid = document.getElementById('slotsGrid');
      grid.innerHTML = '<div class="loading" style="grid-column:1/-1">⏳ Buscando horários...</div>';
      showStep(4);
      selectedSlot = null;
      document.getElementById('btnConfirmar').disabled = true;

      if (!selectedPrestador) {
        grid.innerHTML = `<div class="error" style="grid-column:1/-1">Erro: Nenhum profissional selecionado.</div>`;
        return;
      }

      try {
        const res = await fetch(
          `${API_URL}/api/availability?prestadorId=${selectedPrestador.id}&servicoId=${selectedServico.id}&data=${data}`
        );
        const json = await res.json();

        grid.innerHTML = '';
        if (json.erro || !json.slots || json.slots.length === 0) {
          grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#999; padding:20px;">${json.erro || 'Nenhum horário disponível nesta data.'}</div>`;
          return;
        }

        json.slots.forEach(slot => {
          const btn = document.createElement('button');
          const hora = slot.inicio.split('T')[1].substring(0, 5);
          btn.textContent = hora;
          btn.className = `slot-btn ${slot.disponivel ? '' : 'ocupado'}`;
          if (slot.disponivel) {
            btn.onclick = () => {
              document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              selectedSlot = slot.inicio;
              document.getElementById('btnConfirmar').disabled = false;
            };
          } else {
            btn.disabled = true;
          }
          grid.appendChild(btn);
        });
      } catch (e) {
        grid.innerHTML = `<div class="error" style="grid-column:1/-1">Erro ao buscar horários: ${e.message}</div>`;
      }
    }

    function getNichoId() {
      return (negocioData && negocioData.nicho) ? negocioData.nicho.id : NICHO_ID;
    }

    async function confirmarAgendamento() {
      const btn = document.getElementById('btnConfirmar');
      btn.disabled = true;
      btn.textContent = '⏳ Agendando...';

      try {
        const res = await fetch(`${API_URL}/api/booking`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nichoId: getNichoId(),
            prestadorId: selectedPrestador.id,
            servicoId: selectedServico.id,
            clienteNome: document.getElementById('clienteNome').value.trim(),
            clienteTelefone: document.getElementById('clienteTelefone').value.trim(),
            dataHora: selectedSlot,
          }),
        });

        const json = await res.json();

        if (json.sucesso) {
          document.getElementById('resultProtocolo').textContent = json.protocolo;
          document.getElementById('resultMsg').textContent = json.mensagemConfirmacao;
          showStep(5);
          // 🎉 Toast de sucesso
          mostrarToast('Agendamento realizado com sucesso!', '🎉', 5000);
        } else {
          document.getElementById('err4').textContent = json.erro || 'Erro ao agendar.';
          btn.disabled = false;
          btn.textContent = '✅ Confirmar Agendamento';
        }
      } catch (e) {
        document.getElementById('err4').textContent = `Erro: ${e.message}`;
        btn.disabled = false;
        btn.textContent = '✅ Confirmar Agendamento';
      }
    }

    async function cancelarAgendamento() {
      const proto = document.getElementById('cancelProtocolo').value.trim();
      const tel = document.getElementById('cancelTelefone').value.trim();
      const result = document.getElementById('cancelResult');

      if (!proto || !tel) { result.textContent = 'Preencha protocolo e telefone.'; return; }

      try {
        const res = await fetch(`${API_URL}/api/booking/cancel`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ protocolo: proto, clienteTelefone: tel }),
        });
        const json = await res.json();
        result.style.color = json.sucesso ? '#0090AA' : '#d32f2f';
        result.textContent = json.mensagem || json.erro;
        if (json.sucesso) mostrarToast('Agendamento cancelado.', 'ℹ️', 3500);
      } catch (e) {
        result.textContent = `Erro: ${e.message}`;
      }
    }

    init();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
