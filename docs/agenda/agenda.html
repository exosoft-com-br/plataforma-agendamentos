<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00A8C6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <title>Agenda — agendei.io</title>
  <link rel="stylesheet" href="../admin.css">
</head>
<body>
  <div class="main">
    <h1>Consulta de Agenda</h1>
    <div class="card">
      <div class="form-row">
        <div class="form-group"><label>Nicho</label><select id="nichoId"></select></div>
        <div class="form-group"><label>Prestador</label><select id="prestadorId"></select></div>
        <div class="form-group"><label>Serviço</label><select id="servicoId"></select></div>
        <div class="form-group"><label>Data</label><input type="date" id="data"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Cliente (nome)</label><input type="text" id="clienteNome" placeholder="Buscar por nome"></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="clienteTelefone" placeholder="Buscar por telefone"></div>
      </div>
      <div class="table-scroll">
        <table id="agendaTable" style="display:none">
          <thead><tr><th>Hora</th><th>Cliente</th><th>Telefone</th><th>Serviço</th><th>Status</th><th>Protocolo</th></tr></thead>
          <tbody id="agendaBody"></tbody>
        </table>
      </div>
      <div class="empty" id="agendaEmpty" style="display:none"><div class="empty-icon">📅</div><p>Nenhum agendamento encontrado.</p></div>
    </div>
  </div>
  <script src="agenda.js"></script>
</body>
</html>
