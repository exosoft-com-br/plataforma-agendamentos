<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00A8C6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="agendei.io">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Agenda — agendei.io</title>
  <style>
    :root {
      --cor-primaria: #00A8C6;
      --cor-secundaria: #004D61;
      --cor-texto: #ffffff;
      --cor-fundo: #f0f4f6;
      --cor-botao: #00A8C6;
      --cor-botao-texto: #ffffff;
      --fonte-titulo: 'Montserrat', system-ui, -apple-system, sans-serif;
      --fonte-corpo: 'Montserrat', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--fonte-corpo);
      background: linear-gradient(135deg, var(--cor-primaria) 0%, var(--cor-secundaria) 100%);
      min-height: 100vh;
      padding: 0 0 32px;
    }

    /* ===== BANNER ===== */
    .brand-banner {
      background: rgba(0,0,0,.18);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(6px);
    }
    .brand-banner .brand-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.22);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .brand-banner .brand-text { color: #fff; line-height: 1.2; }
    .brand-banner .brand-text strong { font-size: .95rem; font-weight: 800; letter-spacing: -.01em; }
    .brand-banner .brand-text small { font-size: .65rem; opacity: .8; display: block; }
    .banner-img { width: 100%; max-height: 140px; object-fit: cover; display: block; }

    /* ===== HEADER ===== */
    .header {
      color: var(--cor-texto);
      padding: 20px 24px 16px;
      text-align: center;
    }
    .header img.logo { max-height: 52px; margin-bottom: 8px; border-radius: 8px; }
    .header h1 { font-family: var(--fonte-titulo); font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    .header p { opacity: .85; font-size: .85rem; }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ===== FILTROS ===== */
    .filter-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      padding: 20px;
      margin-bottom: 16px;
    }
    .filter-card h3 {
      font-size: .8rem; font-weight: 700; color: var(--cor-secundaria);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; }
    .form-group label {
      font-size: .75rem; font-weight: 700; color: #667C85;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px;
    }
    .form-group input,
    .form-group select {
      padding: 9px 11px;
      border: 2px solid #dde4e8;
      border-radius: 8px;
      font-size: .9rem;
      font-family: var(--fonte-corpo);
      color: #222;
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(0,168,198,.12);
    }
    /* ===== ATALHOS DE PERÍODO ===== */
    .period-shortcuts {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .btn-period {
      padding: 7px 14px; border: 2px solid #dde4e8; border-radius: 20px;
      font-size: .8rem; font-weight: 700; cursor: pointer;
      font-family: var(--fonte-corpo); background: #fff;
      color: #667C85; transition: all .18s; white-space: nowrap;
    }
    .btn-period:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }
    .btn-period.active {
      background: var(--cor-primaria); border-color: var(--cor-primaria);
      color: #fff; box-shadow: 0 2px 8px rgba(0,168,198,.3);
    }

    .filter-actions {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .btn-filter {
      padding: 8px 16px; border: none; border-radius: 8px;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      font-family: var(--fonte-corpo); transition: all .18s;
    }
    .btn-limpar {
      background: #f0f4f6; color: #667C85; border: 1px solid #dde4e8;
    }
    .btn-limpar:hover { background: #e2eaed; }
    .btn-atualizar {
      background: var(--cor-secundaria); color: #fff; margin-left: auto;
    }
    .btn-atualizar:hover { opacity: .9; }

    /* ===== AGENDA CARD ===== */
    .agenda-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .agenda-card-header {
      background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
      color: #fff;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .agenda-card-header h3 { font-size: .9rem; font-weight: 700; }
    .agenda-count {
      background: rgba(255,255,255,.2);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 700;
    }

    /* ===== TABELA — DESKTOP ===== */
    /* Visibilidade controlada pela classe .tem-dados no .agenda-card */
    .table-scroll { overflow-x: auto; display: none; }
    .agenda-list { display: none; }
    .agenda-card.tem-dados .table-scroll { display: block; }
    .agenda-card.tem-dados .agenda-list { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th {
      background: #f5f8fa; padding: 11px 14px;
      text-align: left; font-weight: 700;
      color: var(--cor-secundaria); font-size: .78rem;
      text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 2px solid #dde4e8;
      white-space: nowrap;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f4f6;
      vertical-align: middle;
      color: #333;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,168,198,.03); }
    .hora-cell { font-weight: 800; color: var(--cor-secundaria); white-space: nowrap; }
    .protocolo-cell { font-size: .78rem; color: #667C85; font-family: monospace; }

    /* ===== BADGES ===== */
    .badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
    }
    .badge-confirmado { background: rgba(0,168,198,.12); color: var(--cor-secundaria); }
    .badge-cancelado { background: rgba(229,57,53,.1); color: #c62828; }
    .badge-concluido { background: rgba(46,158,91,.12); color: #1e7e4a; }

    /* ===== CARDS MOBILE ===== */
    .agenda-list { display: none; }
    .ag-card {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f4f6;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
    }
    .ag-card:last-child { border-bottom: none; }
    .ag-hora-bloco { display: flex; flex-direction: column; align-items: center; gap: 2px; padding-top: 2px; }
    .ag-hora {
      font-size: 1.15rem; font-weight: 800;
      color: var(--cor-primaria); line-height: 1;
      white-space: nowrap;
    }
    .ag-data-mob {
      font-size: .7rem; font-weight: 700;
      color: #667C85; white-space: nowrap;
    }
    .ag-info .ag-cliente { font-weight: 700; font-size: .92rem; color: #222; }
    .ag-info .ag-detalhe { font-size: .8rem; color: #667C85; margin-top: 2px; }
    .ag-info .ag-protocolo { font-size: .72rem; color: #aaa; font-family: monospace; margin-top: 4px; }
    .ag-status { padding-top: 2px; }

    /* ===== MODAL DE EDIÇÃO ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 24px; width: 100%; max-width: 460px;
      transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-size: .95rem; font-weight: 800; color: var(--cor-secundaria);
      margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center;
    }
    .modal h3 button {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: #999; padding: 0;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal label { font-size: .75rem; font-weight: 700; color: #667C85; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
    .modal input, .modal select {
      width: 100%; padding: 9px 11px; border: 2px solid #dde4e8;
      border-radius: 8px; font-size: .9rem; font-family: var(--fonte-corpo); color: #222;
      transition: border-color .2s;
    }
    .modal input:focus, .modal select:focus { outline: none; border-color: var(--cor-primaria); }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-salvar {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      background: var(--cor-primaria); color: #fff;
      font-size: .88rem; font-weight: 700; cursor: pointer; font-family: var(--fonte-corpo);
    }
    .btn-salvar:hover { opacity: .9; }
    .btn-cancelar-modal {
      padding: 10px 16px; border: 1px solid #dde4e8; border-radius: 8px;
      background: #f0f4f6; color: #667C85;
      font-size: .88rem; font-weight: 700; cursor: pointer; font-family: var(--fonte-corpo);
    }
    /* Botão editar nas linhas */
    .btn-editar {
      padding: 4px 10px; border: 1px solid #dde4e8; border-radius: 6px;
      background: #f5f8fa; color: var(--cor-secundaria);
      font-size: .78rem; font-weight: 700; cursor: pointer; font-family: var(--fonte-corpo);
      white-space: nowrap;
    }
    .btn-editar:hover { background: var(--cor-primaria); color: #fff; border-color: var(--cor-primaria); }

    /* ===== ESTADOS ===== */
    .empty-state {
      text-align: center; padding: 48px 24px; color: #667C85;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }
    .loading-state { text-align: center; padding: 32px; color: #667C85; font-size: .9rem; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--cor-secundaria); color: #fff;
      padding: 12px 22px; border-radius: 50px;
      font-weight: 600; font-size: .88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      display: flex; align-items: center; gap: 8px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0; z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ===== RESPONSIVIDADE ===== */
    @media (max-width: 640px) {
      body { padding-bottom: 24px; }
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .btn-atualizar { margin-left: 0; width: 100%; }

      /* Esconde tabela, exibe cards */
      .agenda-card.tem-dados .table-scroll { display: none; }
      .agenda-card.tem-dados .agenda-list { display: block; }
    }

    @media (max-width: 400px) {
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Banner -->
  <div id="bannerContainer">
    <div class="brand-banner" id="brandBanner">
      <div class="brand-icon">📅</div>
      <div class="brand-text">
        <strong>agendei.io</strong>
        <small>criado pela startup exosoft</small>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <img id="headerLogo" class="logo" style="display:none" alt="Logo">
    <h1 id="headerTitle">Agenda</h1>
    <p id="headerSubtitle">Compromissos agendados</p>
  </div>

  <div class="container">

    <!-- Filtros -->
    <div class="filter-card">
      <h3>🔍 Filtros</h3>

      <!-- Atalhos de período -->
      <div class="period-shortcuts">
        <button class="btn-period" id="btn-hoje" onclick="filtrarPeriodo('hoje')">📅 Hoje</button>
        <button class="btn-period" id="btn-amanha" onclick="filtrarPeriodo('amanha')">➡ Amanhã</button>
        <button class="btn-period" id="btn-semana" onclick="filtrarPeriodo('semana')">📆 Esta semana</button>
        <button class="btn-period" id="btn-proxsemana" onclick="filtrarPeriodo('proxsemana')">⏭ Próx. semana</button>
        <button class="btn-period" id="btn-mes" onclick="filtrarPeriodo('mes')">🗓 Este mês</button>
        <button class="btn-period" id="btn-todos" onclick="filtrarPeriodo('todos')">♾ Todos</button>
      </div>

      <div class="filter-grid">
        <div class="form-group">
          <label>Prestador</label>
          <select id="prestadorId">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="form-group">
          <label>De</label>
          <input type="date" id="dataInicio">
        </div>
        <div class="form-group">
          <label>Até</label>
          <input type="date" id="dataFim">
        </div>
        <div class="form-group">
          <label>Cliente</label>
          <input type="text" id="clienteNome" placeholder="Buscar por nome">
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="clienteTelefone" placeholder="Buscar por telefone">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-filter btn-limpar" onclick="limparFiltros()">✕ Limpar filtros</button>
        <button class="btn-filter btn-atualizar" onclick="carregarAgenda()">↻ Atualizar</button>
      </div>
    </div>

    <!-- Agenda -->
    <div class="agenda-card">
      <div class="agenda-card-header">
        <h3 id="agendaTitulo">Agendamentos</h3>
        <span class="agenda-count" id="agendaCount">—</span>
      </div>

      <!-- Tabela (desktop) -->
      <div class="table-scroll">
        <table id="agendaTable">
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Cliente</th>
              <th>Telefone</th>
              <th>Serviço</th>
              <th>Prestador</th>
              <th>Status</th>
              <th>Protocolo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="agendaBody"></tbody>
        </table>
      </div>

      <!-- Cards (mobile) -->
      <div class="agenda-list" id="agendaList"></div>

      <!-- Estado vazio / loading -->
      <div id="agendaEmpty">
        <div class="loading-state">⏳ Carregando agenda...</div>
      </div>
    </div>

  </div>

  <!-- Modal de edição -->
  <div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
    <div class="modal">
      <h3>
        ✏️ Editar Agendamento
        <button onclick="fecharModal()">✕</button>
      </h3>
      <div class="modal-grid">
        <div class="full">
          <label>Cliente</label>
          <input type="text" id="editNome">
        </div>
        <div class="full">
          <label>Telefone</label>
          <input type="tel" id="editTelefone">
        </div>
        <div>
          <label>Data</label>
          <input type="date" id="editData">
        </div>
        <div>
          <label>Hora</label>
          <input type="time" id="editHora">
        </div>
        <div>
          <label>Prestador</label>
          <select id="editPrestador"></select>
        </div>
        <div>
          <label>Serviço</label>
          <select id="editServico"></select>
        </div>
        <div class="full">
          <label>Status</label>
          <select id="editStatus">
            <option value="confirmado">✓ Confirmado</option>
            <option value="concluido">★ Concluído</option>
            <option value="cancelado">✕ Cancelado</option>
          </select>
        </div>
      </div>
      <div id="editErro" style="color:#c62828;font-size:.82rem;margin-top:8px"></div>
      <div class="modal-actions">
        <button class="btn-cancelar-modal" onclick="fecharModal()">Cancelar</button>
        <button class="btn-salvar" onclick="salvarEdicao()">Salvar alterações</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toastMsg"></span>
  </div>

  <script>
    const API_URL = 'https://plataforma-agendamentos-api.onrender.com';
    const NEGOCIO_ID = new URLSearchParams(window.location.search).get('negocioId');
    let NICHO_ID = null; // preenchido após carregar negocio
    let servicosCache = [];
    let prestadoresCache = [];
    let agendamentosCache = []; // mapa id → agendamento para edição
    let editandoId = null;

    function apiFetch(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...opts.headers };
      return fetch(`${API_URL}/api${path}`, { ...opts, headers }).then(r => r.json());
    }

    function mostrarToast(msg, duracao = 3000) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duracao);
    }

    // === PERSONALIZAÇÃO ===
    function aplicarPersonalizacao(p) {
      if (!p) return;
      const r = document.documentElement.style;
      if (p.corPrimaria) r.setProperty('--cor-primaria', p.corPrimaria);
      if (p.corSecundaria) r.setProperty('--cor-secundaria', p.corSecundaria);
      if (p.corTexto) r.setProperty('--cor-texto', p.corTexto);
      if (p.corBotao) r.setProperty('--cor-botao', p.corBotao);
      if (p.fonteTitulo) r.setProperty('--fonte-titulo', `'${p.fonteTitulo}', system-ui, sans-serif`);
      if (p.fonteCorpo) r.setProperty('--fonte-corpo', `'${p.fonteCorpo}', system-ui, sans-serif`);

      if (p.logoUrl) {
        const logo = document.getElementById('headerLogo');
        logo.src = p.logoUrl;
        logo.style.display = 'block';
        logo.onerror = () => { logo.style.display = 'none'; };
      }
      if (p.bannerUrl) {
        document.getElementById('bannerContainer').innerHTML =
          `<img class="banner-img" src="${p.bannerUrl}" alt="Banner"
            onerror="this.parentElement.innerHTML='<div class=brand-banner><div class=brand-icon>📅</div><div class=brand-text><strong>agendei.io</strong><small>criado pela startup exosoft</small></div></div>'">`;
      }
      if (p.faviconUrl) {
        let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
        link.rel = 'icon'; link.href = p.faviconUrl;
        document.head.appendChild(link);
      }
    }

    // === FILTROS DE PERÍODO ===
    function toISO(d) { return d.toISOString().split('T')[0]; }

    function filtrarPeriodo(periodo) {
      document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById(`btn-${periodo}`);
      if (btn) btn.classList.add('active');

      const hoje = new Date();
      hoje.setHours(0,0,0,0);

      document.getElementById('dataInicio').value = '';
      document.getElementById('dataFim').value = '';

      switch (periodo) {
        case 'hoje':
          document.getElementById('dataInicio').value = toISO(hoje);
          document.getElementById('dataFim').value = toISO(hoje);
          break;

        case 'amanha': {
          const amanha = new Date(hoje);
          amanha.setDate(hoje.getDate() + 1);
          document.getElementById('dataInicio').value = toISO(amanha);
          document.getElementById('dataFim').value = toISO(amanha);
          break;
        }

        case 'semana': {
          const diaSemana = hoje.getDay();
          const seg = new Date(hoje);
          seg.setDate(hoje.getDate() - (diaSemana === 0 ? 6 : diaSemana - 1));
          const dom = new Date(seg);
          dom.setDate(seg.getDate() + 6);
          document.getElementById('dataInicio').value = toISO(seg);
          document.getElementById('dataFim').value = toISO(dom);
          break;
        }

        case 'proxsemana': {
          const diaSemana = hoje.getDay();
          const proxSeg = new Date(hoje);
          proxSeg.setDate(hoje.getDate() + (diaSemana === 0 ? 1 : 8 - diaSemana));
          const proxDom = new Date(proxSeg);
          proxDom.setDate(proxSeg.getDate() + 6);
          document.getElementById('dataInicio').value = toISO(proxSeg);
          document.getElementById('dataFim').value = toISO(proxDom);
          break;
        }

        case 'mes': {
          const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
          const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
          document.getElementById('dataInicio').value = toISO(primeiroDia);
          document.getElementById('dataFim').value = toISO(ultimoDia);
          break;
        }

        case 'todos':
          break;
      }

      carregarAgenda();
    }

    function limparFiltros() {
      document.getElementById('prestadorId').value = '';
      document.getElementById('dataInicio').value = '';
      document.getElementById('dataFim').value = '';
      document.getElementById('clienteNome').value = '';
      document.getElementById('clienteTelefone').value = '';
      document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active'));
      carregarAgenda();
    }

    // === BADGE ===
    function badgeStatus(status) {
      const map = {
        confirmado: 'badge-confirmado',
        cancelado: 'badge-cancelado',
        concluido: 'badge-concluido',
      };
      const cls = map[status] || 'badge-confirmado';
      const label = { confirmado: '✓ Confirmado', cancelado: '✕ Cancelado', concluido: '★ Concluído' }[status] || status;
      return `<span class="badge ${cls}">${label}</span>`;
    }

    // === FORMATAR DATA/HORA ===
    const TZ = 'America/Sao_Paulo';
    function formatarData(dataHora) {
      if (!dataHora) return '—';
      return new Date(dataHora).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', timeZone: TZ });
    }
    function formatarHora(dataHora) {
      if (!dataHora) return '—';
      return new Date(dataHora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: TZ });
    }

    // === INIT ===
    async function init() {
      if (!NEGOCIO_ID) {
        document.getElementById('agendaEmpty').innerHTML =
          '<div class="empty-state"><div class="empty-icon">⚠️</div><p>ID do negócio não fornecido na URL.</p></div>';
        return;
      }

      try {
        const negocioData = await apiFetch(`/negocio/${NEGOCIO_ID}/publico`);
        aplicarPersonalizacao(negocioData.personalizacao);

        if (negocioData.negocio) {
          NICHO_ID = negocioData.negocio.nichoId || null;
        } else if (negocioData.nicho) {
          NICHO_ID = negocioData.nicho.id || null;
        }

        const titulo = negocioData.negocio?.nomeFantasia || 'Agenda';
        document.title = `Agenda — ${titulo} — agendei.io`;
        document.getElementById('headerTitle').textContent = titulo;
        document.getElementById('headerSubtitle').textContent = '📅 Agenda de agendamentos';

        servicosCache = negocioData.servicos || [];
        prestadoresCache = negocioData.prestadores || [];

        // Popular select de prestadores com TODOS do negócio
        const prestadorSelect = document.getElementById('prestadorId');
        prestadorSelect.innerHTML = '<option value="">👥 Todos os prestadores</option>';
        prestadoresCache.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = `👤 ${p.nome}${p.categoria ? ` — ${p.categoria}` : ''}`;
          prestadorSelect.appendChild(opt);
        });

        // Filtro padrão: hoje
        filtrarPeriodo('hoje');

      } catch (e) {
        document.getElementById('agendaEmpty').innerHTML =
          `<div class="empty-state"><div class="empty-icon">❌</div><p>Erro ao carregar: ${e.message}</p></div>`;
      }
    }

    // === CARREGAR AGENDA ===
    async function carregarAgenda() {
      const prestadorId = document.getElementById('prestadorId').value;
      const dataInicio = document.getElementById('dataInicio').value;
      const dataFim = document.getElementById('dataFim').value;
      const clienteNome = document.getElementById('clienteNome').value.trim();
      const clienteTelefone = document.getElementById('clienteTelefone').value.trim();

      // Loading state
      document.querySelector('.agenda-card').classList.remove('tem-dados');
      document.getElementById('agendaList').innerHTML = '';
      document.getElementById('agendaEmpty').innerHTML = '<div class="loading-state">⏳ Buscando agendamentos...</div>';
      document.getElementById('agendaEmpty').style.display = 'block';
      document.getElementById('agendaCount').textContent = '...';

      let url = `/booking?negocioId=${encodeURIComponent(NEGOCIO_ID)}&`;
      if (NICHO_ID) url += `nichoId=${encodeURIComponent(NICHO_ID)}&`;
      if (prestadorId) url += `prestadorId=${encodeURIComponent(prestadorId)}&`;
      if (dataInicio && dataFim) {
        url += `dataInicio=${encodeURIComponent(dataInicio)}&dataFim=${encodeURIComponent(dataFim)}&`;
      } else if (dataInicio) {
        url += `data=${encodeURIComponent(dataInicio)}&`;
      }
      if (clienteNome) url += `clienteNome=${encodeURIComponent(clienteNome)}&`;
      if (clienteTelefone) url += `clienteTelefone=${encodeURIComponent(clienteTelefone)}&`;

      try {
        const res = await apiFetch(url);
        const agendamentos = res.agendamentos || [];

        document.getElementById('agendaCount').textContent =
          agendamentos.length === 0 ? 'Nenhum' :
          agendamentos.length === 1 ? '1 agendamento' :
          `${agendamentos.length} agendamentos`;

        if (!agendamentos.length) {
          document.querySelector('.agenda-card').classList.remove('tem-dados');
          document.getElementById('agendaEmpty').innerHTML =
            '<div class="empty-state"><div class="empty-icon">📅</div><p>Nenhum agendamento encontrado para os filtros selecionados.</p></div>';
          document.getElementById('agendaEmpty').style.display = 'block';
          return;
        }

        // Mapas de lookup
        const servicosMap = servicosCache.reduce((m, s) => { m[s.id] = s.nome; return m; }, {});
        const prestadoresMap = prestadoresCache.reduce((m, p) => { m[p.id] = p.nome; return m; }, {});

        // Guarda cache para o modal de edição
        agendamentosCache = agendamentos;

        // ===== TABELA DESKTOP =====
        const tbody = document.getElementById('agendaBody');
        tbody.innerHTML = '';
        agendamentos.forEach(ag => {
          const data = formatarData(ag.data_hora);
          const hora = formatarHora(ag.data_hora);
          const tel = ag.cliente_telefone || '—';
          const servico = servicosMap[ag.servico_id] || ag.servico_id || '—';
          const prestador = ag.prestadorNome || prestadoresMap[ag.prestador_id] || '—';
          tbody.innerHTML += `
            <tr>
              <td class="hora-cell">${data}</td>
              <td class="hora-cell">${hora}</td>
              <td><strong>${ag.cliente_nome || '—'}</strong></td>
              <td>${tel}</td>
              <td>${servico}</td>
              <td>${prestador}</td>
              <td>${badgeStatus(ag.status)}</td>
              <td class="protocolo-cell">${ag.protocolo || '—'}</td>
              <td><button class="btn-editar" onclick="abrirModal('${ag.id}')">✏️ Editar</button></td>
            </tr>`;
        });

        // ===== CARDS MOBILE =====
        const list = document.getElementById('agendaList');
        list.innerHTML = '';
        agendamentos.forEach(ag => {
          const data = formatarData(ag.data_hora);
          const hora = formatarHora(ag.data_hora);
          const servico = servicosMap[ag.servico_id] || ag.servico_id || '—';
          const prestador = ag.prestadorNome || prestadoresMap[ag.prestador_id] || '—';
          const div = document.createElement('div');
          div.className = 'ag-card';
          div.innerHTML = `
            <div class="ag-hora-bloco">
              <div class="ag-hora">${hora}</div>
              <div class="ag-data-mob">${data}</div>
            </div>
            <div class="ag-info">
              <div class="ag-cliente">${ag.cliente_nome || '—'}</div>
              <div class="ag-detalhe">🔧 ${servico} · 👤 ${prestador}</div>
              <div class="ag-detalhe">📞 ${ag.cliente_telefone || '—'}</div>
              <div class="ag-protocolo">${ag.protocolo || ''}</div>
            </div>
            <div class="ag-status" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
              ${badgeStatus(ag.status)}
              <button class="btn-editar" onclick="abrirModal('${ag.id}')">✏️</button>
            </div>`;
          list.appendChild(div);
        });

        document.querySelector('.agenda-card').classList.add('tem-dados');
        document.getElementById('agendaEmpty').style.display = 'none';

      } catch (e) {
        document.querySelector('.agenda-card').classList.remove('tem-dados');
        document.getElementById('agendaEmpty').innerHTML =
          `<div class="empty-state"><div class="empty-icon">❌</div><p>Erro ao buscar agendamentos.</p></div>`;
        document.getElementById('agendaEmpty').style.display = 'block';
        document.getElementById('agendaCount').textContent = 'Erro';
      }
    }

    // === MODAL DE EDIÇÃO ===
    function abrirModal(id) {
      const ag = agendamentosCache.find(a => a.id === id);
      if (!ag) return;
      editandoId = id;

      // Preencher campos
      document.getElementById('editNome').value = ag.cliente_nome || '';
      document.getElementById('editTelefone').value = ag.cliente_telefone || '';
      document.getElementById('editStatus').value = ag.status || 'confirmado';

      // Data e hora separados
      const dt = ag.data_hora ? new Date(ag.data_hora) : null;
      if (dt) {
        document.getElementById('editData').value = dt.toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' });
        document.getElementById('editHora').value = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' });
      }

      // Selects de prestador e serviço
      const selPrest = document.getElementById('editPrestador');
      selPrest.innerHTML = '';
      prestadoresCache.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id;
        o.textContent = p.nome + (p.categoria ? ` — ${p.categoria}` : '');
        if (p.id === ag.prestador_id) o.selected = true;
        selPrest.appendChild(o);
      });

      const selServ = document.getElementById('editServico');
      selServ.innerHTML = '';
      servicosCache.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = s.nome;
        if (s.id === ag.servico_id) o.selected = true;
        selServ.appendChild(o);
      });

      document.getElementById('editErro').textContent = '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function fecharModal(evt) {
      if (evt && evt.target !== document.getElementById('modalOverlay')) return;
      document.getElementById('modalOverlay').classList.remove('open');
      editandoId = null;
    }

    async function salvarEdicao() {
      if (!editandoId) return;
      document.getElementById('editErro').textContent = '';

      const data = document.getElementById('editData').value;
      const hora = document.getElementById('editHora').value;
      // Combina data + hora como horário de SP (UTC-3)
      const dataHora = data && hora ? `${data}T${hora}:00-03:00` : undefined;

      const body = {
        clienteNome: document.getElementById('editNome').value.trim(),
        clienteTelefone: document.getElementById('editTelefone').value.trim(),
        status: document.getElementById('editStatus').value,
        prestadorId: document.getElementById('editPrestador').value,
        servicoId: document.getElementById('editServico').value,
        ...(dataHora ? { dataHora } : {}),
      };

      try {
        const res = await fetch(`${API_URL}/api/booking/${editandoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        if (!res.ok || !json.sucesso) {
          document.getElementById('editErro').textContent = json.erro || 'Erro ao salvar.';
          return;
        }
        document.getElementById('modalOverlay').classList.remove('open');
        editandoId = null;
        mostrarToast('Agendamento atualizado!');
        carregarAgenda();
      } catch (e) {
        document.getElementById('editErro').textContent = `Erro: ${e.message}`;
      }
    }

    // Desativa atalho de período quando o usuário ajusta datas manualmente
    function onDataManual() {
      document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active'));
      carregarAgenda();
    }

    // Eventos dos filtros
    document.getElementById('prestadorId').onchange = carregarAgenda;
    document.getElementById('dataInicio').onchange = onDataManual;
    document.getElementById('dataFim').onchange = onDataManual;
    document.getElementById('clienteNome').oninput = carregarAgenda;
    document.getElementById('clienteTelefone').oninput = carregarAgenda;

    init();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
