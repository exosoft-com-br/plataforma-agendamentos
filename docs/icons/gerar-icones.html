<!DOCTYPE html>
<!--
  agendei.io — Gerador de Ícones PWA
  Abra este arquivo no navegador e clique em "Baixar todos" para gerar os ícones.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerar Ícones agendei.io</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f6; padding: 24px; }
    h1 { color: #004D61; margin-bottom: 16px; }
    .grid { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .icon-wrap { text-align: center; }
    canvas { border-radius: 20%; border: 1px solid #ccc; display: block; }
    p { font-size: .8rem; color: #667C85; margin-top: 4px; }
    button { background: #00A8C6; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #0090AA; }
  </style>
</head>
<body>
  <h1>Gerador de Ícones — agendei.io</h1>
  <div class="grid" id="grid"></div>
  <button onclick="baixarTodos()">⬇ Baixar todos os ícones</button>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

    function desenharIcone(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Fundo gradiente teal
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#00A8C6');
      grad.addColorStop(1, '#004D61');
      ctx.fillStyle = grad;

      // Bordas arredondadas
      const r = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // Círculo do relógio
      const cx = size * 0.5, cy = size * 0.48, rr = size * 0.3;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = size * 0.05;
      ctx.beginPath();
      ctx.arc(cx, cy, rr, 0, Math.PI * 2);
      ctx.stroke();

      // Ponteiros
      ctx.lineCap = 'round';
      // Minuteiro (para cima-direita)
      ctx.lineWidth = size * 0.04;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + rr * 0.55, cy - rr * 0.55);
      ctx.stroke();
      // Horário (para baixo-direita)
      ctx.lineWidth = size * 0.055;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + rr * 0.35, cy + rr * 0.25);
      ctx.stroke();

      // Check mark no topo do relógio
      const ckX = cx + rr * 0.72, ckY = cy - rr * 0.72;
      const ck = size * 0.08;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = size * 0.04;
      ctx.beginPath();
      ctx.moveTo(ckX - ck * 0.4, ckY);
      ctx.lineTo(ckX, ckY + ck * 0.5);
      ctx.lineTo(ckX + ck, ckY - ck * 0.5);
      ctx.stroke();

      return canvas;
    }

    const grid = document.getElementById('grid');
    SIZES.forEach(size => {
      const canvas = desenharIcone(size);
      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      canvas.style.width = Math.min(size, 96) + 'px';
      canvas.style.height = Math.min(size, 96) + 'px';
      const label = document.createElement('p');
      label.textContent = size + 'x' + size;
      wrap.appendChild(canvas);
      wrap.appendChild(label);
      grid.appendChild(wrap);
    });

    function baixarTodos() {
      SIZES.forEach(size => {
        const canvas = desenharIcone(size);
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `icon-${size}.png`;
        a.click();
      });
    }
  </script>
</body>
</html>
